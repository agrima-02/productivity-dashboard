<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Productivity Dashboard</h1>

<div id="loginBox">
<input id="username" placeholder="Enter name">
<button onclick="login()">Enter</button>
</div>

<h3 id="welcome"></h3>

<div class="controls">
<input id="search" placeholder="Search">

<select id="boardSelect" onchange="renderTasks()"></select>

<select id="filterPriority">
<option value="all">All</option>
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<input id="tagInput" placeholder="Add tag">

<button onclick="openForm()">Add Task</button>
<button onclick="addBoard()">+ Board</button>
</div>

<div id="insights"></div>

<div class="board">
<div id="todo" class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
<h2>To Do</h2><div></div>
</div>

<div id="progress" class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
<h2>Progress</h2><div></div>
</div>

<div id="done" class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
<h2>Done</h2><div></div>
</div>
</div>

<div id="form" class="modal">
<div class="box">
<input id="title" placeholder="Title">

<select id="priority">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<input type="date" id="dueDate">

<input id="tags" placeholder="tags (comma separated)">

<button onclick="saveTask()">Save</button>
<button onclick="closeForm()">Cancel</button>
</div>
</div>
    
<canvas id="chart" width="400" height="200"></canvas>

<script src="script.js"></script>
</body>
</html>
